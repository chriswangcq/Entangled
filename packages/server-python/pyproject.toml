[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "entangled-server"
version = "0.1.0"
description = "Server-side Entity Sync Engine — define entities, get real-time sync for free"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.100",
    "starlette>=0.27",
]

[project.optional-dependencies]
dev = ["pytest", "httpx", "uvicorn"]
