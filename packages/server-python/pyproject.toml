[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "entangled-server"
version = "0.1.0"
description = "Server-side Entity Sync Engine — define entities, get real-time sync for free"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
# No hard dependencies — the host app provides starlette/fastapi
dependencies = []

[project.optional-dependencies]
starlette = ["starlette>=0.27"]
fastapi = ["fastapi>=0.100"]
dev = ["pytest", "httpx", "uvicorn", "starlette>=0.27"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
