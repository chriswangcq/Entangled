[package]
name = "entangled-client"
version = "0.1.0"
edition = "2021"
description = "Rust client engine for Entangled — entity cache, push processing, cascade invalidation"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "time", "macros"] }
tracing = "0.1"

# Optional: Tauri integration
tauri = { version = "2", optional = true }

[features]
default = []
tauri = ["dep:tauri"]
