[package]
name = "entangled-client"
version = "0.2.0"
edition = "2021"
description = "Entangled — self-contained entity sync engine with persistent SQLite cache"
license = "MIT"
build = "build.rs"

[build-dependencies]
serde_json = "1"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "time", "macros", "rt"] }
tracing = "0.1"
rusqlite = { version = "0.31", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }

# Transport (WS connection management)
tokio-tungstenite = { version = "0.21", features = ["native-tls"], optional = true }
futures-util = { version = "0.3", optional = true }

# Optional: Tauri integration (thin adapter)
tauri = { version = "2", optional = true }
r2d2_sqlite = "=0.24.0"
r2d2 = "0.8.10"

[features]
default = ["transport"]
transport = ["dep:tokio-tungstenite", "dep:futures-util"]
tauri = ["dep:tauri"]
